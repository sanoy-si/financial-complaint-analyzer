services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: grounded
      POSTGRES_PASSWORD: grounded
      POSTGRES_DB: grounded
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grounded"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://grounded:grounded@db:5432/grounded
      JWT_SECRET: dev-only-change-me
      EMBEDDING_PROVIDER: hash
      LLM_PROVIDER: mock
      CORS_ORIGINS: '["*"]'
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build: ./apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  pgdata:
